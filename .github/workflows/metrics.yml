name: 📊 Render Profile Metrics

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    name: 🧠 Build profile SVGs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: ⚡ Render metrics dashboard
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.svg
          output_action: none    # ❗ don't commit to main — we publish later
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: arkapatra31
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          config_display: regular
          config_animations: yes

          # 🧮  3D isometric contribution calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # 🐍  Languages breakdown (Python-forward)
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex, dockerfile, makefile, scss, less, shell
          plugin_languages_details: percentage, bytes-size
          plugin_languages_sections: most-used
          plugin_languages_limit: 8
          plugin_languages_analysis_timeout: 15

          # 📌  Repo topics (icons mode)
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons

          # 📈  Coding habits & daily rhythm
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes

          # ⭐  Followup on issues & PRs
          plugin_followup: yes
          plugin_followup_sections: repositories

      - name: 📦 Stage metrics.svg into dist/
        run: mkdir -p dist && mv metrics.svg dist/metrics.svg

      - name: 🌊 Render contribution wave
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: arkapatra31
          outputs: |
            dist/contribution-wave.svg?palette=github-dark&color_snake=%23FFD43B

      - name: 🚀 Publish both SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          commit_message: "chore(assets): refresh profile SVGs ♻️"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
