name: 📊 Render Profile Metrics

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: 🧠 Build profile SVGs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # ───── 1. Render metrics.svg → commit directly to `output` branch ─────
      - name: ⚡ Render metrics dashboard
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.svg
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: arkapatra31
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          config_display: regular
          config_animations: yes
          committer_branch: output
          committer_message: "chore(metrics): refresh dashboard ♻️"

          # 🧮  3D isometric contribution calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # 🐍  Languages breakdown (Python-forward)
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex, dockerfile, makefile, scss, less, shell
          plugin_languages_details: percentage, bytes-size
          plugin_languages_sections: most-used
          plugin_languages_limit: 8
          plugin_languages_analysis_timeout: 15

          # 📌  Repo topics (icons mode)
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons

          # 📈  Coding habits & daily rhythm
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes

          # ⭐  Followup on issues & PRs
          plugin_followup: yes
          plugin_followup_sections: repositories

      # ───── 2. Check out `output` branch (now contains fresh metrics.svg) ─────
      - name: 📥 Checkout output branch
        uses: actions/checkout@v4
        with:
          ref: output
          path: output-branch

      # ───── 3. Render contribution-wave.svg into the output worktree ─────
      - name: 🌊 Render contribution wave
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: arkapatra31
          outputs: |
            output-branch/contribution-wave.svg?palette=github-dark&color_snake=%23FFD43B

      # ───── 4. Commit & push the wave onto `output` branch ─────
      - name: 🚀 Commit contribution wave
        working-directory: output-branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add contribution-wave.svg
          if git diff --quiet --cached; then
            echo "No changes in contribution-wave.svg — skipping commit."
          else
            git commit -m "chore(wave): refresh contribution wave 🐍"
            git push
          fi
